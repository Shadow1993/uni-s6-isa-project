<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
    <p>{{ message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button [mat-dialog-close]="false" cdkFocusInitial>{{ cancelText }}</button>
    <button mat-raised-button [mat-dialog-close]="true">
        {{ confirmText }}
    </button>
</mat-dialog-actions>
