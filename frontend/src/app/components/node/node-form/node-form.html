<form [formGroup]="entity" (submit)="onSubmit()">
  <div>
    <label for="name"> Name: </label>
    <input type="text" formControlName="name" name="name" />
  </div>
  <div>
      <label for="ram"> RAM: </label>
      <input type="number" formControlName="ram" name="ram" />
    </div>
    <div>
        <label for="storage"> Storage: </label>
        <input type="number" formControlName="storage" name="storage" />
    </div>
    <div>
    <div>
    <label for="url"> URL: </label>
    <input type="text" formControlName="url" name="url" />
    </div>
    <select formControlName="clusterId" name="clusterId">
      <option value="0" disabled>Choose Cluster..</option>
      @for(cluster of clusters(); track cluster.id) {
      <option [value]="cluster.id">{{cluster.name}}</option>
      }
    </select>
  </div>
  <div>
    <button>
      @if (id() === null) {
      Add
      } @else {
      Update
      }
    </button>
  </div>
</form>
