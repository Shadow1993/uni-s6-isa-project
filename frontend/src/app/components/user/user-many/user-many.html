<table>
    <thead>
        <tr>
            <td>ID</td>
            <td>Email</td>
            <td>Created at</td>
            <td>Active</td>
            <td>Activity <button (click)="add()">+</button></td>
        </tr>
    </thead>
    <tbody>
        @for(entity of entities(); track entity.id) {
        <tr>
            <td>{{entity.id}}</td>
            <td>{{entity.email}}</td>
            <td>{{entity.createdAt | date: "dd. MM yyyy '@' HH:mm:ss"}}</td>
            <td>{{entity.active}}</td>
            <td>
                <button (click)="detail(entity.id!)">D</button>
                <!-- Not implemented -->
                <!-- <button (click)="update(entity.id!)">E</button> -->
                <button (click)="delete(entity.id!)">X</button>
            </td>
        </tr>
        }
    </tbody>
</table>
